##
# Shared Redis Sentinel cluster template.
#
# Defines a minimal Redis Sentinel cluster (1 master + 2 replicas + 2 sentinels)
# and extends the openemr service with the env vars required to activate predis-sentinel
# session storage.
#
# Include this file in COMPOSE_FILE when you want the full test suite to run
# against Redis-backed sessions.  Redis containers are always started (no profile
# guard) so the openemr container finds them when it boots.
#
# Relative bind-mount paths here are resolved by Docker Compose v2 relative to
# this file's directory (ci/compose-shared-redis-sentinel/).

services:
  redis-master:
    image: redis:8.6@sha256:1f073813b641755b70b0200da64131bbeeb4ec5b633ca67772229b49820caafa
    container_name: redis-master
    command: ["redis-server", "/etc/redis/redis.conf"]
    volumes:
    - ./redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "strongpassword", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis-replica-1:
    image: redis:8.6@sha256:1f073813b641755b70b0200da64131bbeeb4ec5b633ca67772229b49820caafa
    command: ["redis-server", "/etc/redis/redis.conf", "--replicaof", "redis-master", "6379"]
    volumes:
    - ./redis.conf:/etc/redis/redis.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy

  redis-replica-2:
    image: redis:8.6@sha256:1f073813b641755b70b0200da64131bbeeb4ec5b633ca67772229b49820caafa
    command: ["redis-server", "/etc/redis/redis.conf", "--replicaof", "redis-master", "6379"]
    volumes:
    - ./redis.conf:/etc/redis/redis.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy

  sentinel-1:
    image: redis:8.6@sha256:1f073813b641755b70b0200da64131bbeeb4ec5b633ca67772229b49820caafa
    # The sentinel.conf template is mounted read-only.  On startup, the template
    # is copied to /tmp/sentinel.conf (writable by the redis user) before running
    # redis-sentinel.  This avoids a permission problem on Linux CI runners where
    # the mounted file is owned by the host runner user (uid 1001) but the redis
    # process runs as the redis user (uid 999) and cannot write to it.  Redis
    # Sentinel must be able to write its myid and runtime state back to the config.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "cp /tmp/sentinel-template.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    volumes:
    - ./sentinel-1.conf:/tmp/sentinel-template.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      # Sentinels in this config have no requirepass, so no -a flag
      test: ["CMD", "redis-cli", "-p", "26379", "SENTINEL", "masters"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  sentinel-2:
    image: redis:8.6@sha256:1f073813b641755b70b0200da64131bbeeb4ec5b633ca67772229b49820caafa
    # See sentinel-1 comment above for why the copy-to-tmp approach is used.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "cp /tmp/sentinel-template.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    volumes:
    - ./sentinel-2.conf:/tmp/sentinel-template.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      # Sentinels in this config have no requirepass, so no -a flag
      test: ["CMD", "redis-cli", "-p", "26379", "SENTINEL", "masters"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  openemr:
    environment:
      SESSION_STORAGE_MODE: predis-sentinel
      REDIS_SENTINELS: sentinel-1|||sentinel-2
      REDIS_MASTER: redis-master
      REDIS_SENTINELS_PASSWORD: strongpassword
      REDIS_MASTER_PASSWORD: strongpassword
    depends_on:
      sentinel-1:
        condition: service_healthy
      sentinel-2:
        condition: service_healthy
